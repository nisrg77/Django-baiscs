{% extends 'tasks/base.html' %}

{% block content %}
<h1>Delete Task</h1>
<div class="card">
    <p>Are you sure you want to delete "{{ task.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirm Delete</button>
        <a href="{% url 'task_list' %}" class="btn" style="background-color: #6c757d; margin-left: 0.5rem;">Cancel</a>
    </form>
</div>
{% endblock %}
